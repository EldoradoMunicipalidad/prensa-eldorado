server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Directus API proxy (no CORS needed, same domain)
    location /directus/ {
        proxy_pass https://panel-prensa.eldorado.gob.ar/;
        proxy_set_header Host panel-prensa.eldorado.gob.ar;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # Increase buffer for large API responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Long timeout for Directus admin (uploads, etc.)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS for the directus sub-path (browser treats as same-origin)
        add_header Access-Control-Allow-Origin *;
    }

    # Static assets with cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
